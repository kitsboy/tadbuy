<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tadbuy — Bitcoin-Native Ad Buying Platform</title>
    <meta name="description" content="Tadbuy is the decentralized ad-buying suite powered by Bitcoin, Lightning Network, and AI. Launch cross-platform campaigns, track metrics in real time, and settle instantly with sats." />
