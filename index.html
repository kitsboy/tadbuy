<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff9f1c" />
    <meta name="color-scheme" content="dark" />

    <title>Tadbuy — Bitcoin-Native Ad Buying Platform</title>
    <meta name="description" content="Buy ads across 8 platforms. Pay in sats via Lightning, BOLT12, on-chain, or Nostr Zaps. The world's first Bitcoin-native DSP by Give A Bit." />
    <meta name="keywords" content="bitcoin advertising, lightning network ads, nostr ads, buy ads with bitcoin, decentralized advertising, DSP" />
    <meta name="author" content="Give A Bit" />
    <link rel="canonical" href="https://tadbuy.giveabit.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tadbuy.giveabit.io/" />
    <meta property="og:title" content="Tadbuy — Bitcoin-Native Ad Buying Platform" />
    <meta property="og:description" content="Buy ads across 8 platforms. Pay in sats via Lightning, BOLT12, on-chain, or Nostr Zaps." />
    <meta property="og:image" content="https://tadbuy.giveabit.io/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Tadbuy" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@give_bit" />
    <meta name="twitter:title" content="Tadbuy — Bitcoin-Native Ad Buying Platform" />
    <meta name="twitter:description" content="Buy ads across 8 platforms. Pay in sats via Lightning, BOLT12, on-chain, or Nostr Zaps." />
    <meta name="twitter:image" content="https://tadbuy.giveabit.io/og-image.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Tadbuy",
          "url": "https://tadbuy.giveabit.io",
          "logo": "https://tadbuy.giveabit.io/favicon.png",
          "parentOrganization": {
            "@type": "Organization",
            "name": "Give A Bit",
            "url": "https://giveabit.io"
          },
          "sameAs": ["https://twitter.com/give_bit"]
        },
        {
          "@type": "WebSite",
          "name": "Tadbuy",
          "url": "https://tadbuy.giveabit.io",
          "description": "Bitcoin-native advertising platform. Buy ads with Lightning, BOLT12, and Nostr Zaps.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://tadbuy.giveabit.io/marketplace?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Tadbuy",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "BTC"
          },
          "description": "The world's first Bitcoin-native DSP for cross-platform advertising."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" hidden style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:#18181b;color:#fff;font-family:Inter,system-ui,sans-serif;">
      <div style="max-width:24rem;text-align:center;">
        <p style="font-size:1.25rem;font-weight:800;margin:0 0 .5rem;">Tadbuy failed to load</p>
        <p style="font-size:.875rem;color:#a1a1aa;line-height:1.5;margin:0 0 1.25rem;">The app bundle did not load. This is usually a stale cache after a deploy — try a hard refresh or clear site data.</p>
        <button type="button" onclick="location.reload()" style="background:#ff9f1c;color:#000;font-weight:700;border:none;border-radius:.75rem;padding:.625rem 1.25rem;cursor:pointer;">Reload</button>
      </div>
    </div>
    <script>
      (function () {
        var shown = false;
        function showFallback() {
          if (shown) return;
          shown = true;
          var el = document.getElementById('boot-fallback');
          if (el) el.hidden = false;
        }
        window.addEventListener('error', function (e) {
          if (e.target && e.target.tagName === 'SCRIPT') showFallback();
        }, true);
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount === 0) showFallback();
        }, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
