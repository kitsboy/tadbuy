<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadbuy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-boundary" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-boundary').textContent += e.message + '\n' + e.error.stack + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-boundary').textContent += e.reason + '\n\n';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
